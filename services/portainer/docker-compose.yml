services:
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    network_mode: host
    environment:
      TZ: 'America/Chicago'
      WEBPASSWORD: 'changeme'        # Change this!
      PIHOLE_DNS_: '8.8.8.8;8.8.4.4'
      DNSMASQ_LISTENING: 'all'
    volumes:
      - ./etc-pihole:/etc/pihole
      - ./etc-dnsmasq.d:/etc/dnsmasq.d
    restart: unless-stopped

# Notes:
# - network_mode: host is required to avoid port 53 conflicts with Docker NAT
# - Disable systemd-resolved on Ubuntu before deploying:
#     sudo systemctl stop systemd-resolved
#     sudo systemctl disable systemd-resolved
#     sudo rm /etc/resolv.conf
#     echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf
# - Change password after deploy:
#     docker exec -it pihole pihole setpassword
# - Access admin UI at http://<server-ip>/admin
